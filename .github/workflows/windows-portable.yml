name: Windows portable package

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/windows-portable.yml
      - cmake/DeployRuntimeDependencies.cmake
      # The packaged app compiles + smoke-runs here, so exercise it when the
      # portable runtime code or build config changes, not just the workflow.
      - src/**
      - CMakeLists.txt

permissions:
  contents: read

concurrency:
  group: windows-portable-${{ github.ref }}
  cancel-in-progress: false

env:
  QT_VERSION: 6.8.3
  DOTNET_SDK_VERSION: 8.0.x
  CURL_VERSION: 8.12.1
  # Pinned OpenMS dependency versions for reproducible packaging. Bump these
  # together when moving to a newer OpenMS: the viewer must build against the
  # exact OpenMS + contrib it will run on (OpenMS has no stable cross-minor ABI).
  # OPENMS_REF is the merge commit for OpenMS#9752, which provides the
  # core-only target and install graph consumed below. OPENMS_CONTRIB_TAG was
  # the latest OpenMS/contrib release when the packaging profile was created.
  OPENMS_REF: ad6025add791453143191e0253f8cc86b5eb7409
  OPENMS_CONTRIB_TAG: 2026-03-25-183345
  OPENMS_SOURCE: ${{ github.workspace }}/_deps/OpenMS
  OPENMS_CONTRIB: ${{ github.workspace }}/_deps/contrib
  OPENMS_CONTRIB_SOURCE: ${{ github.workspace }}/_deps/contrib-source
  OPENMS_BUILD: ${{ github.workspace }}/_build/OpenMS
  OPENMS_INSTALL: ${{ github.workspace }}/_install/OpenMS
  VIEWER_BUILD: ${{ github.workspace }}/_build/viewer
  VIEWER_STAGE: ${{ github.workspace }}/_stage/OpenMSViewer
  THERMO_TEST_DATA: ${{ github.workspace }}/_deps/OpenMS/src/tests/topp/THIRDPARTY/ginkgotoxin-ms-switching.raw
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  # Work around the MSVC constexpr mutex constructor issue also handled by
  # OpenMS's Windows wheel build.
  CXXFLAGS: -D_DISABLE_CONSTEXPR_MUTEX_CONSTRUCTOR

jobs:
  package-windows-x64:
    name: Windows x64 portable ZIP
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Check out OpenMS Viewer
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check out OpenMS (pinned)
        uses: actions/checkout@v6
        with:
          repository: OpenMS/OpenMS
          ref: ${{ env.OPENMS_REF }}
          path: _deps/OpenMS
          persist-credentials: false

      - name: Record source revisions
        shell: pwsh
        run: |
          $viewerSha = (git rev-parse HEAD).Trim()
          $openmsSha = (git -C "$env:OPENMS_SOURCE" rev-parse HEAD).Trim()
          "VIEWER_SHA=$viewerSha" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "OPENMS_SHA=$openmsSha" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "OPENMS_SHORT_SHA=$($openmsSha.Substring(0, 12))" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          archives: qtbase qtsvg qtimageformats
          cache: true

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Set up Visual Studio shell
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      - name: Download OpenMS contrib dependencies
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          contrib_tag="$OPENMS_CONTRIB_TAG"
          echo "CONTRIB_TAG=$contrib_tag" >> "$GITHUB_ENV"
          mkdir -p "$OPENMS_CONTRIB"
          cd "$OPENMS_CONTRIB"
          gh release download "$contrib_tag" \
            --repo OpenMS/contrib \
            --pattern 'contrib_build-Windows.tar.gz'
          7z x -so contrib_build-Windows.tar.gz | 7z x -si -ttar
          rm contrib_build-Windows.tar.gz
          git clone --depth 1 --branch "$contrib_tag" \
            https://github.com/OpenMS/contrib.git "$OPENMS_CONTRIB_SOURCE"

      # Keep this aligned with OpenMS's own Windows build recipe. Schannel
      # avoids shipping a second TLS implementation in the portable folder.
      - name: Build libcurl with Schannel
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/_deps"
          curl --fail --location --retry 3 \
            --output "curl-$CURL_VERSION.tar.gz" \
            "https://curl.se/download/curl-$CURL_VERSION.tar.gz"
          tar xzf "curl-$CURL_VERSION.tar.gz"
          cmake -S "curl-$CURL_VERSION" -B curl-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$OPENMS_CONTRIB" \
            -DBUILD_SHARED_LIBS=ON \
            -DCURL_USE_SCHANNEL=ON \
            -DBUILD_CURL_EXE=OFF \
            -DBUILD_TESTING=OFF \
            -DCURL_DISABLE_LDAP=ON \
            -DCURL_USE_LIBPSL=OFF
          cmake --build curl-build
          cmake --install curl-build

      - name: Configure OpenMS core
        shell: bash
        run: bash ci/portable/configure-openms-windows.sh

      - name: Build and install OpenMS core
        shell: bash
        run: bash ci/portable/build-openms-windows.sh

      - name: Build and install OpenMS Viewer
        shell: bash
        run: bash ci/portable/build-viewer-windows.sh

      - name: Deploy runtime dependencies
        shell: pwsh
        run: ci/portable/deploy-windows.ps1

      - name: Bundle .NET 8 runtime
        shell: pwsh
        run: ci/portable/bundle-dotnet-windows.ps1

      - name: Add licenses and build provenance
        shell: pwsh
        run: ci/portable/stage-data-windows.ps1

      - name: Verify portable folder
        shell: pwsh
        run: ci/portable/verify-windows.ps1

      - name: Create ZIP and checksum
        id: package
        shell: pwsh
        run: ci/portable/archive-windows.ps1

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: error
          retention-days: 14
