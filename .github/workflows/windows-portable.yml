name: Windows portable package

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-portable-${{ github.ref }}
  cancel-in-progress: false

env:
  QT_VERSION: 6.8.3
  DOTNET_SDK_VERSION: 8.0.x
  CURL_VERSION: 8.12.1
  OPENMS_SOURCE: ${{ github.workspace }}/_deps/OpenMS
  OPENMS_CONTRIB: ${{ github.workspace }}/_deps/contrib
  OPENMS_CONTRIB_SOURCE: ${{ github.workspace }}/_deps/contrib-source
  OPENMS_BUILD: ${{ github.workspace }}/_build/OpenMS
  OPENMS_INSTALL: ${{ github.workspace }}/_install/OpenMS
  VIEWER_BUILD: ${{ github.workspace }}/_build/viewer
  VIEWER_STAGE: ${{ github.workspace }}/_stage/OpenMSViewer
  THERMO_TEST_DATA: ${{ github.workspace }}/_deps/OpenMS/src/tests/topp/THIRDPARTY/ginkgotoxin-ms-switching.raw
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  # Work around the MSVC constexpr mutex constructor issue also handled by
  # OpenMS's Windows wheel build.
  CXXFLAGS: -D_DISABLE_CONSTEXPR_MUTEX_CONSTRUCTOR

jobs:
  package-windows-x64:
    name: Windows x64 portable ZIP
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Check out OpenMS Viewer
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check out OpenMS develop
        uses: actions/checkout@v6
        with:
          repository: OpenMS/OpenMS
          ref: develop
          path: _deps/OpenMS
          persist-credentials: false

      - name: Record source revisions
        shell: pwsh
        run: |
          $viewerSha = (git rev-parse HEAD).Trim()
          $openmsSha = (git -C "$env:OPENMS_SOURCE" rev-parse HEAD).Trim()
          "VIEWER_SHA=$viewerSha" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "OPENMS_SHA=$openmsSha" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "OPENMS_SHORT_SHA=$($openmsSha.Substring(0, 12))" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          archives: qtbase qtsvg qtimageformats
          cache: true

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Set up Visual Studio shell
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      - name: Download OpenMS contrib dependencies
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          contrib_tag=$(gh release view --repo OpenMS/contrib --json tagName --jq .tagName)
          echo "CONTRIB_TAG=$contrib_tag" >> "$GITHUB_ENV"
          mkdir -p "$OPENMS_CONTRIB"
          cd "$OPENMS_CONTRIB"
          gh release download "$contrib_tag" \
            --repo OpenMS/contrib \
            --pattern 'contrib_build-Windows.tar.gz'
          7z x -so contrib_build-Windows.tar.gz | 7z x -si -ttar
          rm contrib_build-Windows.tar.gz
          git clone --depth 1 --branch "$contrib_tag" \
            https://github.com/OpenMS/contrib.git "$OPENMS_CONTRIB_SOURCE"

      # Keep this aligned with OpenMS's own Windows build recipe. Schannel
      # avoids shipping a second TLS implementation in the portable folder.
      - name: Build libcurl with Schannel
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/_deps"
          curl --fail --location --retry 3 \
            --output "curl-$CURL_VERSION.tar.gz" \
            "https://curl.se/download/curl-$CURL_VERSION.tar.gz"
          tar xzf "curl-$CURL_VERSION.tar.gz"
          cmake -S "curl-$CURL_VERSION" -B curl-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$OPENMS_CONTRIB" \
            -DBUILD_SHARED_LIBS=ON \
            -DCURL_USE_SCHANNEL=ON \
            -DBUILD_CURL_EXE=OFF \
            -DBUILD_TESTING=OFF \
            -DCURL_DISABLE_LDAP=ON \
            -DCURL_USE_LIBPSL=OFF
          cmake --build curl-build
          cmake --install curl-build

      - name: Configure OpenMS core
        shell: bash
        run: |
          cmake -S "$OPENMS_SOURCE" -B "$OPENMS_BUILD" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$OPENMS_INSTALL" \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR/lib/cmake;$QT_ROOT_DIR" \
            -DOPENMS_CONTRIB_LIBS="$OPENMS_CONTRIB" \
            -DPYOPENMS=OFF \
            -DWITH_GUI=OFF \
            -DWITH_THERMO_RAW=ON \
            -DWITH_OPENTIMS=ON \
            -DWITH_WNETALIGN=OFF \
            -DWITH_HDF5=OFF \
            -DWITH_ONNX=OFF \
            -DMT_ENABLE_OPENMP=ON \
            -DARROW_USE_STATIC=ON \
            -DENABLE_TUTORIALS=OFF \
            -DENABLE_DOCS=OFF \
            -DENABLE_CLASS_TESTING=OFF \
            -DENABLE_TOPP_TESTING=OFF \
            -DENABLE_PIPELINE_TESTING=OFF \
            -DENABLE_STYLE_TESTING=OFF \
            -DENABLE_THERMO_RAW_TESTS=OFF \
            -DENABLE_UPDATE_CHECK=OFF \
            -DGIT_TRACKING=OFF \
            -DHAS_XSERVER=OFF \
            -DPACKAGE_TYPE=none

      - name: Build and install OpenMS core
        shell: bash
        run: |
          cmake --build "$OPENMS_BUILD" --target OpenMS OpenSwathAlgo
          cmake --install "$OPENMS_BUILD" --component library --strip
          cmake --install "$OPENMS_BUILD" --component OpenMS_headers
          cmake --install "$OPENMS_BUILD" --component OpenSwathAlgo_headers
          cmake --install "$OPENMS_BUILD" --component thirdparty_headers
          cmake --install "$OPENMS_BUILD" --component cmake
          cmake --install "$OPENMS_BUILD" --component share

          # OpenMS develop builds BrukerTimsImagingFile into OpenMS.dll, but
          # currently omits its public header from the OpenMS_headers install
          # component. Keep the standalone SDK complete for the viewer build.
          cmake -E copy_if_different \
            "$OPENMS_SOURCE/src/openms/include/OpenMS/FORMAT/BrukerTimsImagingFile.h" \
            "$OPENMS_INSTALL/include/OpenMS/FORMAT/BrukerTimsImagingFile.h"

      - name: Build and install OpenMS Viewer
        shell: bash
        run: |
          test -f "$OPENMS_INSTALL/CMake/OpenMSConfig.cmake"
          cmake -S "$GITHUB_WORKSPACE" -B "$VIEWER_BUILD" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$VIEWER_STAGE" \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR/lib/cmake;$QT_ROOT_DIR;$OPENMS_CONTRIB;$OPENMS_INSTALL" \
            -DOPENMS_CONTRIB_LIBS="$OPENMS_CONTRIB" \
            -DOpenMS_DIR="$OPENMS_INSTALL/CMake" \
            -DOPENMS_VIEWER_SQLITE3_LIBRARY="$OPENMS_BUILD/lib/sqlite3.lib" \
            -DOPENMS_VIEWER_BUILD_TESTS=OFF \
            -DOPENMS_VIEWER_BUILD_THERMO_SMOKE=ON
          cmake --build "$VIEWER_BUILD" --target openms-viewer openms-viewer-thermo-smoke
          cmake --install "$VIEWER_BUILD"

      - name: Deploy runtime dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bin = Join-Path $env:VIEWER_STAGE "bin"
          $executable = Join-Path $bin "openms-viewer.exe"
          $searchDirectories = @(
            $bin,
            (Join-Path $env:OPENMS_INSTALL "bin"),
            (Join-Path $env:OPENMS_INSTALL "lib"),
            (Join-Path $env:OPENMS_BUILD "bin"),
            (Join-Path $env:OPENMS_BUILD "lib"),
            (Join-Path $env:OPENMS_CONTRIB "bin"),
            (Join-Path $env:OPENMS_CONTRIB "lib"),
            (Join-Path $env:QT_ROOT_DIR "bin")
          ) | Where-Object { Test-Path $_ }

          $deployArguments = @(
            "-DEXECUTABLE=$executable",
            "-DDESTINATION=$bin",
            "-DSEARCH_DIRECTORIES=$($searchDirectories -join ';')",
            "-P",
            (Join-Path $env:GITHUB_WORKSPACE "cmake/DeployRuntimeDependencies.cmake")
          )
          & cmake @deployArguments
          if ($LASTEXITCODE -ne 0) { throw "Runtime dependency collection failed." }

          # windeployqt owns the Qt DLL/plugin layout. The MSVC runtime is copied
          # app-locally below so the ZIP needs no prerequisite installer.
          $windeployqt = Join-Path $env:QT_ROOT_DIR "bin/windeployqt.exe"
          & $windeployqt --release --no-translations --no-compiler-runtime $executable
          if ($LASTEXITCODE -ne 0) { throw "windeployqt failed." }

          # App-local deployment is the portable Windows model: take the retail
          # CRT DLLs from Visual Studio's Redist tree, never from System32.
          $redistRoots = [System.Collections.Generic.List[string]]::new()
          if ($env:VCToolsRedistDir -and (Test-Path $env:VCToolsRedistDir)) {
            $redistRoots.Add($env:VCToolsRedistDir)
          }

          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio/Installer/vswhere.exe"
          if (Test-Path $vswhere) {
            $vsInstall = (& $vswhere -latest -products * `
              -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
              -property installationPath).Trim()
            if ($vsInstall) {
              Get-ChildItem (Join-Path $vsInstall "VC/Redist/MSVC") -Directory |
                Sort-Object Name -Descending |
                ForEach-Object { $redistRoots.Add($_.FullName) }
            }
          }

          $crtDirectory = $null
          $openmpDirectory = $null
          foreach ($root in $redistRoots) {
            $x64Root = Join-Path $root "x64"
            if (-not (Test-Path $x64Root)) { continue }
            $candidateCrt = Get-ChildItem $x64Root -Directory -Filter "Microsoft.VC*.CRT" |
              Sort-Object Name -Descending |
              Select-Object -First 1
            $candidateOpenmp = Get-ChildItem $x64Root -Directory -Filter "Microsoft.VC*.OpenMP" |
              Sort-Object Name -Descending |
              Select-Object -First 1
            if ($candidateCrt -and $candidateOpenmp) {
              $crtDirectory = $candidateCrt
              $openmpDirectory = $candidateOpenmp
              break
            }
          }
          if (-not $crtDirectory) { throw "Could not locate the Visual C++ x64 redistributable DLLs." }
          if (-not $openmpDirectory) { throw "Could not locate the Visual C++ x64 OpenMP runtime DLLs." }
          Copy-Item (Join-Path $crtDirectory.FullName "*.dll") -Destination $bin -Force
          Copy-Item (Join-Path $openmpDirectory.FullName "*.dll") -Destination $bin -Force

      - name: Bundle .NET 8 runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $runtimeCandidates = @()
          foreach ($line in (& dotnet --list-runtimes)) {
            if ($line -match '^Microsoft\.NETCore\.App\s+(\d+\.\d+\.\d+)\s+\[(.+)\]$') {
              $version = [version]$Matches[1]
              if ($version.Major -eq 8) {
                $runtimeCandidates += [pscustomobject]@{
                  Version = $version
                  Root = $Matches[2]
                }
              }
            }
          }
          $runtime = $runtimeCandidates |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if (-not $runtime) { throw "The .NET 8 runtime installed with the SDK was not found." }

          $runtimeVersion = $runtime.Version.ToString()
          $sourceDotnetRoot = Split-Path (Split-Path $runtime.Root -Parent) -Parent
          $runtimeSource = Join-Path $runtime.Root $runtimeVersion
          $fxrSource = Get-ChildItem (Join-Path $sourceDotnetRoot "host/fxr") -Directory |
            Where-Object { ([version]$_.Name).Major -eq 8 } |
            Sort-Object { [version]$_.Name } -Descending |
            Select-Object -First 1
          if (-not $fxrSource) { throw "A .NET 8 hostfxr directory was not found." }

          $targetDotnetRoot = Join-Path $env:VIEWER_STAGE "dotnet"
          $targetRuntimeParent = Join-Path $targetDotnetRoot "shared/Microsoft.NETCore.App"
          $targetFxrParent = Join-Path $targetDotnetRoot "host/fxr"
          New-Item -ItemType Directory -Path $targetRuntimeParent -Force | Out-Null
          New-Item -ItemType Directory -Path $targetFxrParent -Force | Out-Null
          Copy-Item $runtimeSource (Join-Path $targetRuntimeParent $runtimeVersion) -Recurse
          Copy-Item $fxrSource.FullName (Join-Path $targetFxrParent $fxrSource.Name) -Recurse
          Copy-Item (Join-Path $sourceDotnetRoot "dotnet.exe") $targetDotnetRoot
          foreach ($notice in @("LICENSE.txt", "ThirdPartyNotices.txt")) {
            $source = Join-Path $sourceDotnetRoot $notice
            if (Test-Path $source) { Copy-Item $source $targetDotnetRoot }
          }

          $savedDotnetRoot = $env:DOTNET_ROOT
          try {
            $env:DOTNET_ROOT = $targetDotnetRoot
            & (Join-Path $targetDotnetRoot "dotnet.exe") --list-runtimes
            if ($LASTEXITCODE -ne 0) { throw "The bundled .NET runtime failed its smoke test." }
          }
          finally {
            $env:DOTNET_ROOT = $savedDotnetRoot
          }
          "DOTNET_RUNTIME_VERSION=$runtimeVersion" | Out-File `
            -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "DOTNET_FXR_VERSION=$($fxrSource.Name)" | Out-File `
            -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Add licenses and build provenance
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $managedSource = Join-Path $env:OPENMS_INSTALL "lib/openms_thermo_bridge/managed"
          $managedDestination = Join-Path $env:VIEWER_STAGE "bin/managed"
          if (-not (Test-Path $managedSource)) {
            throw "The installed OpenMS Thermo managed bridge was not found."
          }
          Copy-Item $managedSource $managedDestination -Recurse

          $shareRoot = Join-Path $env:VIEWER_STAGE "share"
          Copy-Item (Join-Path $env:OPENMS_INSTALL "share/OpenMS") `
            (Join-Path $shareRoot "OpenMS") -Recurse

          $licenseRoot = Join-Path $env:VIEWER_STAGE "share/licenses"
          New-Item -ItemType Directory -Path $licenseRoot -Force | Out-Null
          Copy-Item (Join-Path $env:OPENMS_SOURCE "License.txt") `
            (Join-Path $licenseRoot "OpenMS-BSD-3-Clause.txt")
          Copy-Item (Join-Path $env:OPENMS_CONTRIB_SOURCE "LICENSE.md") `
            (Join-Path $licenseRoot "OpenMS-contrib.md")
          Copy-Item (Join-Path $env:OPENMS_CONTRIB_SOURCE "licensetexts") `
            (Join-Path $licenseRoot "OpenMS-contrib-licenses") -Recurse
          $thermoLicense = Join-Path $env:OPENMS_BUILD "ThermoRawFileReader-License.doc"
          if (Test-Path $thermoLicense) {
            Copy-Item $thermoLicense $licenseRoot
          }
          if (Test-Path (Join-Path $env:QT_ROOT_DIR "LICENSES")) {
            Copy-Item (Join-Path $env:QT_ROOT_DIR "LICENSES") `
              (Join-Path $licenseRoot "Qt") -Recurse
          }

          $buildInfo = @"
          OpenMS Viewer portable Windows build
          Viewer commit: $env:VIEWER_SHA
          OpenMS ref: develop
          OpenMS commit: $env:OPENMS_SHA
          OpenMS contrib release: $env:CONTRIB_TAG
          OpenMS WITH_GUI: OFF
          OpenMS WITH_THERMO_RAW: ON
          OpenMS WITH_OPENTIMS: ON
          OpenMS OpenMP: ON
          Qt: $env:QT_VERSION (win64_msvc2022_64)
          .NET runtime: $env:DOTNET_RUNTIME_VERSION (hostfxr $env:DOTNET_FXR_VERSION, x64, app-local)
          Architecture: x64
          Built at: $((Get-Date).ToUniversalTime().ToString("o"))
          "@
          $buildInfo.Trim() | Set-Content `
            (Join-Path $env:VIEWER_STAGE "BUILD-INFO.txt") -Encoding utf8
          "Run bin\openms-viewer.exe. No installation is required." | Set-Content `
            (Join-Path $env:VIEWER_STAGE "README-WINDOWS.txt") -Encoding utf8

      - name: Verify portable folder
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bin = Join-Path $env:VIEWER_STAGE "bin"
          $requiredPaths = @(
            (Join-Path $bin "openms-viewer.exe"),
            (Join-Path $bin "OpenMS.dll"),
            (Join-Path $bin "Qt6Core.dll"),
            (Join-Path $bin "Qt6Gui.dll"),
            (Join-Path $bin "Qt6Widgets.dll"),
            (Join-Path $bin "Qt6Svg.dll"),
            (Join-Path $bin "vcruntime140.dll"),
            (Join-Path $bin "msvcp140.dll"),
            (Join-Path $bin "vcomp140.dll"),
            (Join-Path $bin "openms_thermo_bridge.dll"),
            (Join-Path $bin "nethost.dll"),
            (Join-Path $bin "managed/ThermoWrapperManaged.dll"),
            (Join-Path $bin "managed/ThermoWrapperManaged.runtimeconfig.json"),
            (Join-Path $bin "managed/ThermoFisher.CommonCore.RawFileReader.dll"),
            (Join-Path $bin "platforms/qwindows.dll"),
            (Join-Path $env:VIEWER_STAGE "dotnet/dotnet.exe"),
            (Join-Path $env:VIEWER_STAGE "dotnet/host/fxr/$env:DOTNET_FXR_VERSION/hostfxr.dll"),
            (Join-Path $env:VIEWER_STAGE "dotnet/shared/Microsoft.NETCore.App/$env:DOTNET_RUNTIME_VERSION/System.Private.CoreLib.dll"),
            (Join-Path $env:VIEWER_STAGE "share/OpenMS/CHEMISTRY/unimod.xml")
          )
          foreach ($path in $requiredPaths) {
            if (-not (Test-Path $path)) { throw "Portable package is missing: $path" }
          }

          # Do not let Qt, OpenMS, contrib, or Visual Studio installations on the
          # runner's PATH hide a missing app-local DLL.
          $savedPath = $env:PATH
          $savedDotnetRoot = $env:DOTNET_ROOT
          $savedOpenmsDataPath = $env:OPENMS_DATA_PATH
          $savedCommandLineNoMessageBoxes = $env:QT_COMMAND_LINE_PARSER_NO_GUI_MESSAGE_BOXES
          try {
            $env:PATH = "$bin;$env:SystemRoot/System32;$env:SystemRoot"
            $env:DOTNET_ROOT = Join-Path $env:VIEWER_STAGE "dotnet"
            $env:OPENMS_DATA_PATH = Join-Path $env:VIEWER_STAGE "share/OpenMS"
            # QCommandLineParser otherwise displays --version in a modal dialog
            # for a Windows GUI executable without an attached console.
            $env:QT_COMMAND_LINE_PARSER_NO_GUI_MESSAGE_BOXES = "1"
            $process = Start-Process `
              -FilePath (Join-Path $bin "openms-viewer.exe") `
              -ArgumentList "--version" -PassThru
            if (-not $process.WaitForExit(30000)) {
              Stop-Process -Id $process.Id -Force
              throw "Portable executable smoke test timed out."
            }
            if ($process.ExitCode -ne 0) {
              throw "Portable executable smoke test exited with $($process.ExitCode)."
            }

            # Load a small real RAW file against only the packaged DLLs,
            # managed bridge, app-local .NET runtime, and shared data.
            $thermoTest = Get-ChildItem $env:VIEWER_BUILD `
              -Filter "openms-viewer-thermo-smoke.exe" -File -Recurse |
              Select-Object -First 1
            if (-not $thermoTest) { throw "Thermo RAW smoke probe was not built." }
            $smokeDirectory = Join-Path $env:RUNNER_TEMP "openms-viewer-thermo-smoke"
            New-Item -ItemType Directory -Path $smokeDirectory -Force | Out-Null
            $smokeExecutable = Join-Path $smokeDirectory "openms-viewer-thermo-smoke.exe"
            Copy-Item $thermoTest.FullName $smokeExecutable -Force
            $smokeProcess = Start-Process `
              -FilePath $smokeExecutable `
              -ArgumentList $env:THERMO_TEST_DATA -NoNewWindow -PassThru
            if (-not $smokeProcess.WaitForExit(300000)) {
              Stop-Process -Id $smokeProcess.Id -Force
              throw "Packaged Thermo RAW smoke test timed out."
            }
            if ($smokeProcess.ExitCode -ne 0) {
              throw "Packaged Thermo RAW smoke test exited with $($smokeProcess.ExitCode)."
            }
          }
          finally {
            $env:PATH = $savedPath
            $env:DOTNET_ROOT = $savedDotnetRoot
            $env:OPENMS_DATA_PATH = $savedOpenmsDataPath
            $env:QT_COMMAND_LINE_PARSER_NO_GUI_MESSAGE_BOXES = $savedCommandLineNoMessageBoxes
          }

      - name: Create ZIP and checksum
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $artifactName = "OpenMSViewer-Windows-x64-openms-$env:OPENMS_SHORT_SHA"
          $artifactDirectory = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          $zip = Join-Path $artifactDirectory "$artifactName.zip"
          New-Item -ItemType Directory -Path $artifactDirectory -Force | Out-Null
          Compress-Archive -Path $env:VIEWER_STAGE -DestinationPath $zip -CompressionLevel Optimal
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $artifactName.zip" | Set-Content "$zip.sha256" -Encoding ascii
          "artifact_name=$artifactName" | Out-File `
            -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: error
          retention-days: 14
